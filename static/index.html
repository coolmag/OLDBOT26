<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
    <title>Aurora Cyber-Retro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: transparent;
            --c: #00f3ff; /* Кибер-голубой */
            --p: #ff00ea; /* Неоновый розовый */
            --b: rgba(20, 20, 25, 0.6);
            --tl: 75px; --tr: 28px;
        }
        
        body {
            background-color: transparent !important;
            background-image: none !important;
            color: #fff;
            font-family: 'SF Mono', 'Cascadia Code', 'Roboto Mono', monospace;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0; overflow: hidden; user-select: none;
        }

        /* Блок с названием трека */
        .inf {
            text-align: center; width: 100%; max-width: 360px; margin-bottom: 30px;
            padding: 15px; border-radius: 12px;
            background: rgba(10, 10, 15, 0.7);
            border: 1px solid rgba(0, 243, 255, 0.2);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6), inset 0 0 15px rgba(0, 243, 255, 0.05);
        }
        .tit {
            color: #fff; font-weight: 900; font-size: 18px; text-transform: uppercase;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.6); letter-spacing: 1px;
        }
        .art {
            font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden;
            text-overflow: ellipsis; display: block; margin-top: 6px; text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(90deg, var(--c), var(--p));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* 3D Кассета */
        .cas {
            width: 360px; height: 230px;
            background: linear-gradient(to bottom, #f0f0ed, #c8c8c4);
            border-radius: 16px; position: relative;
            box-shadow: 
                inset 0 4px 6px rgba(255,255,255,0.9), 
                inset 0 -6px 8px rgba(0,0,0,0.3), 
                0 20px 40px rgba(0,0,0,0.8), 
                0 0 0 2px #444;
            display: flex; flex-direction: column; align-items: center; padding: 16px;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .cas:hover { transform: scale(1.02); }
        .cas::after {
            content: ''; position: absolute; bottom: 0; left: 8%; width: 84%; height: 22px;
            background: linear-gradient(to bottom, #dcdcd8, #b8b8b4);
            border-radius: 6px 6px 0 0; box-shadow: inset 0 2px 5px rgba(0,0,0,0.15);
        }

        /* Болты */
        .scr {
            position: absolute; width: 14px; height: 14px;
            background: linear-gradient(135deg, #eee, #777); border-radius: 50%;
            box-shadow: inset 1px 1px 4px rgba(0,0,0,0.6), 0 1px 1px rgba(255,255,255,0.8);
            border: 1px solid #555;
        }
        .scr::before, .scr::after {
            content: ''; position: absolute; top: 50%; left: 20%; width: 60%; height: 1.5px;
            background: rgba(0,0,0,0.8); box-shadow: 0 1px 0 rgba(255,255,255,0.4);
        }
        .scr::before { transform: translateY(-50%) rotate(45deg); }
        .scr::after { transform: translateY(-50%) rotate(-45deg); }
        .tl { top: 14px; left: 14px; } .tr { top: 14px; right: 14px; }
        .bl { bottom: 14px; left: 14px; } .br { bottom: 14px; right: 14px; }

        /* Этикетка */
        .lbl {
            width: 94%; height: 145px; background: #fffcf2; border-radius: 10px;
            position: relative; overflow: hidden;
            box-shadow: inset 0 0 25px rgba(0,0,0,0.05), 0 2px 5px rgba(0,0,0,0.2);
            border: 1px solid rgba(0,0,0,0.15);
            background-image: repeating-linear-gradient(0deg, transparent, transparent 4px, rgba(0,0,0,0.02) 4px, rgba(0,0,0,0.02) 5px);
        }
        .sl {
            position: absolute; top: 14px; left: 16px;
            border: 2px solid #d90429; color: #d90429; padding: 2px 10px;
            font-family: 'Times New Roman', serif; font-weight: 900; font-size: 16px;
            border-radius: 4px; letter-spacing: 1.5px; text-shadow: 0 0 2px rgba(217,4,41,0.3);
        }
        .rl {
            position: absolute; top: 22px; right: 16px; width: 45%; height: 8px;
            border-top: 3px solid #d90429; border-bottom: 3px solid #d90429;
        }

        /* Неоновый Эквалайзер */
        .vc {
            position: absolute; top: 25px; right: 20%; display: flex; gap: 4px;
            align-items: flex-end; height: 24px; opacity: 0.2; transition: opacity 0.3s;
        }
        .ply .vc { opacity: 1; }
        .bar {
            width: 6px; background: var(--c); height: 4px; border-radius: 2px;
            animation: bounce 0.5s infinite ease-in-out alternate;
            animation-play-state: paused; box-shadow: 0 0 8px var(--c);
        }
        .ply .bar { animation-play-state: running; }
        @keyframes bounce {
            0% { height: 4px; background: var(--c); box-shadow: 0 0 5px var(--c); }
            100% { height: 22px; background: var(--p); box-shadow: 0 0 10px var(--p); }
        }

        /* Окно с пленкой */
        .bb {
            position: absolute; top: 55px; width: 100%; height: 55px;
            background: #111; display: flex; justify-content: center; align-items: center;
            box-shadow: inset 0 4px 8px #000, 0 1px 1px rgba(255,255,255,0.6);
        }
        .win {
            width: 230px; height: 40px; background: rgba(255,255,255,0.08);
            border-radius: 6px; border: 2px solid #555; border-top: 3px solid #222; border-bottom: 2px solid #888;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; position: relative; overflow: hidden;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.9); backdrop-filter: blur(2px);
        }
        .win::before {
            content: ''; position: absolute; top: 0; left: -50%; width: 200%; height: 100%;
            background: linear-gradient(115deg, transparent 40%, rgba(255,255,255,0.2) 45%, transparent 50%);
            z-index: 10; pointer-events: none;
        }
        .t-rl {
            position: absolute; top: 50%; border-radius: 50%;
            background: radial-gradient(circle, #3a2e2a 0, #0a0a0a 80%);
            box-shadow: 0 0 0 1px #000, 0 0 8px #000; transition: all 0.3s linear; z-index: 1;
        }
        .t-l { left: 36px; width: var(--tl); height: var(--tl); transform: translate(-50%, -50%); }
        .t-r { right: 36px; width: var(--tr); height: var(--tr); transform: translate(50%, -50%); }

        /* Катушки */
        .sp {
            width: 32px; height: 32px; border-radius: 50%; background: #e0e0e0;
            position: relative; z-index: 5; box-shadow: 0 2px 5px rgba(0,0,0,0.9), inset 0 0 3px #fff;
            border: 1px solid #999;
        }
        .spt {
            position: absolute; inset: 2px; border-radius: 50%;
            background: repeating-conic-gradient(#333 0deg, #333 30deg, #ddd 30deg, #ddd 60deg);
            -webkit-mask-image: radial-gradient(circle, transparent 35%, #000 36%);
            animation: spn 2s linear infinite; animation-play-state: paused;
        }
        .sp::after {
            content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 10px; height: 10px; background: #000; border-radius: 50%; box-shadow: inset 0 1px 2px rgba(255,255,255,0.4);
        }
        .ply .spt { animation-play-state: running; }
        @keyframes spn { 100% { transform: rotate(360deg); } }

        .gb {
            position: absolute; bottom: 12px; width: 92%; height: 24px;
            background: #7ca888; display: flex; justify-content: space-between; align-items: center;
            padding: 0 12px; color: #800; font-family: 'Arial Black', sans-serif; font-weight: 900;
            font-size: 16px; border: 1px solid #5a8064; box-shadow: inset 0 1px 3px rgba(255,255,255,0.5);
        }

        /* Прогресс-бары (Трек и Громкость) */
        .pw {
            width: 100%; max-width: 360px; height: 8px; background: rgba(0,0,0,0.8);
            border-radius: 4px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1);
            margin-top: 30px; cursor: pointer; box-shadow: inset 0 2px 4px rgba(0,0,0,0.8);
        }
        .pf {
            width: 0%; height: 100%; background: linear-gradient(90deg, var(--c), var(--p));
            box-shadow: 0 0 15px var(--p); transition: width 0.1s linear;
        }

        /* Кнопки управления (Стеклянные) */
        .mc { margin-top: 20px; display: flex; justify-content: center; align-items: center; gap: 12px; width: 100%; }
        
        .bn {
            background: rgba(20, 20, 25, 0.6); border: 1px solid rgba(255,255,255,0.1);
            color: #ccc; font-weight: 700; font-size: 16px; padding: 15px 20px;
            cursor: pointer; border-radius: 12px; transition: all 0.2s ease;
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
        .bn:hover {
            background: rgba(30, 30, 40, 0.8); border-color: rgba(255,255,255,0.3); color: #fff;
            box-shadow: 0 6px 20px rgba(0,0,0,0.6), 0 0 10px rgba(0, 243, 255, 0.2);
            transform: translateY(-2px);
        }
        .bn:active { transform: translateY(2px); box-shadow: 0 2px 5px rgba(0,0,0,0.6); }
        .bn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
        
        /* Главная кнопка ПУСК */
        .pb {
            color: var(--c); border-color: rgba(0, 243, 255, 0.4);
            min-width: 100px; font-size: 18px; font-weight: 900; letter-spacing: 2px;
        }
        .ply .pb {
            color: #fff; background: rgba(255, 0, 234, 0.2); border-color: var(--p);
            text-shadow: 0 0 8px #fff; box-shadow: 0 0 25px rgba(255, 0, 234, 0.5);
        }

        /* Поиск */
        .sb { margin-top: 30px; width: 100%; max-width: 360px; display: flex; justify-content: center; }
        input {
            background: rgba(10, 10, 15, 0.8); border: 1px solid rgba(255,255,255,0.1);
            color: #fff; font-weight: 700; padding: 16px; width: 100%; text-transform: uppercase;
            outline: none; text-align: center; font-size: 16px; border-radius: 12px;
            transition: all 0.3s ease; backdrop-filter: blur(5px);
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.8); letter-spacing: 1px;
        }
        input:focus {
            border-color: var(--c); background: rgba(20, 20, 30, 0.9);
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.8), 0 0 15px rgba(0, 243, 255, 0.3);
        }
        input::placeholder { color: #555; font-weight: 500; }

        /* Всплывающие меню (Glassmorphism) */
        .drc { position: fixed; inset: 0; z-index: 100; pointer-events: none; }
        .ov { position: absolute; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); opacity: 0; transition: opacity 0.3s; }
        .dr {
            position: absolute; bottom: 0; left: 0; right: 0; height: 75vh;
            background: rgba(15, 15, 20, 0.9); border-radius: 24px 24px 0 0;
            transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.2, 1, 0.3, 1);
            display: flex; flex-direction: column; padding: 25px 20px;
            border-top: 1px solid rgba(255,255,255,0.1); box-shadow: 0 -10px 50px rgba(0,0,0,0.9);
            backdrop-filter: blur(15px);
        }
        .dh { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .drt { margin: 0; color: #fff; font-size: 20px; font-weight: 900; letter-spacing: 2px; }
        .cb { background: rgba(255,255,255,0.1); border: none; color: #fff; width: 40px; height: 40px; border-radius: 50%; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .cb:hover { background: rgba(255, 0, 234, 0.5); transform: rotate(90deg); }
        .dco { overflow-y: auto; color: #fff; padding-bottom: 20px; }
        .drc.act { pointer-events: all; } .drc.act .ov { opacity: 1; } .drc.act .dr { transform: translateY(0); }
        
        .mi, .pi {
            padding: 16px 20px; background: rgba(255,255,255,0.03); border-radius: 12px;
            margin-bottom: 12px; cursor: pointer; transition: all 0.2s;
            border: 1px solid rgba(255,255,255,0.02); font-size: 15px; letter-spacing: 1px;
        }
        .mi:hover, .pi:hover { background: rgba(255,255,255,0.08); transform: translateX(5px); border-color: rgba(255,255,255,0.1); }
        .pi.act { background: rgba(0,243,255,0.1); border-left: 4px solid var(--c); color: var(--c); font-weight: 900; }

        /* ИИ Модалка */
        .md {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            gap: 25px; padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.3s;
            backdrop-filter: blur(15px);
        }
        .md.act { opacity: 1; pointer-events: all; }
    </style>
</head>
<body>
    <div class="inf"><span class="tit" id="ti">АВРОРА СВЕМА</span><span class="art" id="ar">ИНИЦИАЛИЗАЦИЯ...</span></div>
    
    <div class="cas" id="dk">
        <div class="scr tl"></div><div class="scr tr"></div><div class="scr bl"></div><div class="scr br"></div>
        <div class="lbl">
            <div class="sl">Свема</div><div class="rl"></div>
            <div class="vc">
                <div class="bar" style="animation-duration:.4s"></div><div class="bar" style="animation-duration:.5s"></div>
                <div class="bar" style="animation-duration:.3s"></div><div class="bar" style="animation-duration:.6s"></div>
                <div class="bar" style="animation-duration:.4s"></div><div class="bar" style="animation-duration:.5s"></div>
                <div class="bar" style="animation-duration:.3s"></div><div class="bar" style="animation-duration:.4s"></div>
            </div>
            <div class="bb">
                <div class="win"><div class="t-rl t-l"></div><div class="t-rl t-r"></div>
                    <div class="sp"><div class="spt"></div></div><div class="sp"><div class="spt"></div></div>
                </div>
            </div>
            <div class="gb"><span>МК-60-5</span><span style="color:#333;font-size:13px">1991</span></div>
        </div>
    </div>
    
    <div class="pw" id="pb"><div class="pf" id="pf"></div></div>
    
    <div class="mc">
        <button class="bn" id="bp" onclick="a.p.prev()">◀◀</button> 
        <button class="bn pb" id="bpl" onclick="a.p.tog()">ПУСК</button> 
        <button class="bn" id="bn" onclick="a.p.nxt()">▶▶</button> 
        <button class="bn" onclick="a.u.tD('pl')">☰</button> 
        <button class="bn" onclick="a.u.tD('g')">♪</button> 
        <button class="bn" onclick="a.u.tA(true)">🤖</button>
    </div>
    
    <div style="display:flex;align-items:center;gap:15px;width:100%;max-width:360px;margin-top:20px">
        <span style="color:#888;font-size:18px">🔈</span>
        <div class="pw" id="vb" style="margin-top:0;flex:1;height:6px"><div class="pf" id="vf" style="background:var(--c);box-shadow:0 0 8px var(--c);width:100%"></div></div>
        <span style="color:#fff;font-size:18px;text-shadow:0 0 5px #fff">🔊</span>
    </div>
    
    <form class="sb" onsubmit="a.s();return false"><input type="text" id="q" placeholder="ПОИСК ИЛИ ИИ..."></form>
    
    <div id="drc" class="drc">
        <div class="ov" id="obg"></div>
        <div class="dr">
            <div class="dh"><h3 class="drt" id="drt">МЕНЮ</h3><button class="cb" onclick="a.u.tD()">✕</button></div>
            <div id="dco" class="dco"></div>
        </div>
    </div>
    
    <form id="am" class="md" onsubmit="a.aAI();return false">
        <h3 style="color:var(--p);margin-bottom:0;font-size:26px;letter-spacing:3px;text-shadow:0 0 15px var(--p)">ИИ ДИДЖЕЙ</h3>
        <input type="text" id="ai" placeholder="ЧТО НАЙТИ ДЛЯ ВАС?" style="max-width:320px">
        <div style="display:flex;gap:15px;width:100%;max-width:320px;margin-top:10px">
            <button type="submit" class="bn pb" style="flex:1">ВРУБАЙ</button> 
            <button type="button" class="bn" onclick="a.u.tA(false)" style="flex:1">ОТМЕНА</button>
        </div>
    </form>
    
    <script>
        // JS Логика осталась абсолютно такой же, как ты написал! Я ее не трогал, чтобы ничего не сломать.
        if(window.Telegram && window.Telegram.WebApp){ window.Telegram.WebApp.expand(); window.Telegram.WebApp.ready(); }
        const $ = i => document.getElementById(i);
        
        const a = {
            st: {
                s: { p: [], ci: -1 }, l: {},
                sub(e, c) { this.l[e] = this.l[e] || []; this.l[e].push(c); },
                n(e, d) { if(this.l[e]) this.l[e].forEach(c => c(d)); },
                set(n) { Object.assign(this.s, n); if(n.p) this.n("p", this.s.p); if(n.ci !== undefined) this.n("t", this.s.p[this.s.ci]); }
            },
            
            ap: {
                b: window.location.origin,
                async f(e) { const r = await fetch(`${this.b}${e}`); if(!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); },
                s: (q) => a.ap.f(`/api/player/playlist?query=${encodeURIComponent(q)}`),
                aAI: (q) => a.ap.f(`/api/ai/dj?prompt=${encodeURIComponent(q)}`)
            },
            
            p: {
                au: new Audio(),
                init() {
                    this.au.addEventListener("ended", () => this.nxt());
                    this.au.addEventListener("timeupdate", () => a.u.uP(this.au.currentTime, this.au.duration));
                    this.au.addEventListener("play", () => a.u.sPS(true));
                    this.au.addEventListener("pause", () => a.u.sPS(false));
                    this.au.addEventListener("error", () => {
                        a.u.sE("ПЛЕНКА ЗАЖЕВАНА");
                        setTimeout(() => { if(a.st.s.p.length > 1) this.nxt(); }, 2000);
                    });
                    this.au.volume = 1;
                },
                ply(t) {
                    if(!t) return;
                    a.u.uT(t);
                    this.au.src = `${a.ap.b}/stream/${t.identifier}`;
                    this.au.play().catch(e => { console.warn("Autoplay blocked"); a.u.sPS(false); });
                },
                tog() { if(this.au.src) this.au.paused ? this.au.play() : this.au.pause(); },
                nxt() {
                    if(!a.st.s.p.length) return; let i = a.st.s.ci + 1;
                    if(i >= a.st.s.p.length) i = 0; a.st.set({ ci: i }); this.ply(a.st.s.p[i]);
                },
                prev() {
                    if(!a.st.s.p.length) return;
                    if(this.au.currentTime > 3) { this.au.currentTime = 0; } 
                    else { let i = a.st.s.ci - 1; if(i < 0) i = a.st.s.p.length - 1; a.st.set({ ci: i }); this.ply(a.st.s.p[i]); }
                }
            },
            
            u: {
                dr: null,
                sPS(p) { $("dk").classList.toggle("ply", p); $("bpl").innerText = p ? "СТОП" : "ПУСК"; },
                uT(t) { if(t) { $("ti").innerText = t.title || "НЕИЗВЕСТНО"; $("ar").innerText = t.artist || t.uploader || "НЕИЗВЕСТНО"; } },
                sE(m) { $("ti").innerText = m; $("ar").innerText = ""; this.sPS(false); },
                sL(l) { $("bpl").disabled = l; $("bn").disabled = l; $("bp").disabled = l; if(l) { $("ti").innerText = "НАСТРОЙКА..."; $("ar").innerText = "ОЖИДАЙТЕ..."; } },
                uP(c, t) {
                    if(t > 0) {
                        const p = c / t; $("pf").style.width = `${p * 100}%`;
                        const mt = 75, mnt = 28; const ls = mt - (p * (mt - mnt)), rs = mnt + (p * (mt - mnt));
                        document.documentElement.style.setProperty('--tl', `${ls}px`); document.documentElement.style.setProperty('--tr', `${rs}px`);
                    }
                },
                tD(d) {
                    const c = $("drc"); if(this.dr && this.dr === d) { this.dr = null; } else { this.dr = d; }
                    if(this.dr) { c.classList.add("act"); $("drt").textContent = this.dr === "pl" ? "ОЧЕРЕДЬ" : "КАТАЛОГ ЖАНРОВ"; this.rD(); } else { c.classList.remove("act"); }
                },
                rD() {
                    const c = $("dco"); c.innerHTML = "";
                    if(this.dr === "pl") {
                        if(!a.st.s.p.length) c.innerHTML = "<div style='text-align:center;color:#666;margin-top:20px'>КАССЕТА ПУСТА</div>";
                        a.st.s.p.forEach((t, i) => {
                            const d = document.createElement("div"); d.className = "pi" + (i === a.st.s.ci ? " act" : "");
                            d.textContent = `${t.title} - ${t.artist || t.uploader}`;
                            d.onclick = () => { a.st.set({ ci: i }); a.p.ply(t); this.tD(); }; c.appendChild(d);
                        });
                    } else if(this.dr === "g") {
                        a.g.forEach(g => {
                            const d = document.createElement("div"); d.className = "mi"; d.textContent = g.n;
                            d.onclick = () => { a.s(g.q); this.tD(); }; c.appendChild(d);
                        });
                    }
                },
                tA(s) { $("am").classList.toggle("act", s); }
            },
            
            g: [
