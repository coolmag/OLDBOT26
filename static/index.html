<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
    <title>Aurora Cyber-Retro 2026</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: transparent;
            --c: #00f3ff; /* Голубой неон */
            --p: #ff0055; /* Малиновый неон */
            --b: #111;
            --tl: 75px; --tr: 28px;
        }
        
        body {
            background-color: transparent !important;
            background-image: none !important;
            color: #fff;
            font-family: 'SF Mono', 'Cascadia Code', 'Roboto Mono', Courier, monospace;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0; overflow: hidden; user-select: none;
        }

        /* 1. ПАНЕЛЬ ТРЕКА (Минимализм, без рамок) */
        .inf {
            text-align: center; width: 100%; max-width: 380px; margin-bottom: 40px;
        }
        .tit {
            color: #fff; font-weight: 900; font-size: 22px; text-transform: uppercase;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block;
            text-shadow: 0 2px 15px rgba(255, 255, 255, 0.4); letter-spacing: 2px;
        }
        .art {
            font-size: 13px; color: var(--c); font-weight: 700; white-space: nowrap; overflow: hidden;
            text-overflow: ellipsis; display: block; margin-top: 8px; text-transform: uppercase;
            letter-spacing: 4px; text-shadow: 0 0 10px rgba(0, 243, 255, 0.4);
        }

        /* 2. КАССЕТА (Темное стекло) */
        .cas {
            width: 340px; height: 215px;
            background: rgba(15, 15, 20, 0.65);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-radius: 12px; position: relative;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px rgba(0,0,0,0.8), inset 0 1px 1px rgba(255,255,255,0.15);
            display: flex; flex-direction: column; align-items: center; padding: 12px;
            transition: transform 0.3s ease;
        }
        .cas:hover { transform: translateY(-5px); }
        .cas::after {
            content: ''; position: absolute; bottom: 0; left: 10%; width: 80%; height: 18px;
            background: rgba(0, 0, 0, 0.4); border-radius: 4px 4px 0 0;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        /* Болты - Темный металл */
        .scr {
            position: absolute; width: 12px; height: 12px;
            background: #1a1a1a; border-radius: 50%;
            box-shadow: inset 1px 1px 2px rgba(0,0,0,0.8), 0 1px 1px rgba(255,255,255,0.1);
            border: 1px solid #333;
        }
        .scr::before, .scr::after {
            content: ''; position: absolute; top: 50%; left: 20%; width: 60%; height: 1.5px; background: #444;
        }
        .scr::before { transform: translateY(-50%) rotate(45deg); }
        .scr::after { transform: translateY(-50%) rotate(-45deg); }
        .tl { top: 12px; left: 12px; } .tr { top: 12px; right: 12px; }
        .bl { bottom: 12px; left: 12px; } .br { bottom: 12px; right: 12px; }

        /* Этикетка - Карбон / Матовый черный */
        .lbl {
            width: 90%; height: 135px; background: rgba(5, 5, 8, 0.8);
            border-radius: 6px; position: relative;
            box-shadow: inset 0 0 20px rgba(0,0,0,1);
            border: 1px solid rgba(255,255,255,0.03); display: flex; flex-direction: column; align-items: center;
        }
        
        /* Маркировка */
        .sl {
            position: absolute; top: 12px; left: 15px;
            color: var(--c); font-size: 11px; font-weight: 900; letter-spacing: 2px;
            text-shadow: 0 0 5px var(--c); opacity: 0.8;
        }
        .rl { display: none; /* Убрали красные полоски */ }

        /* Окно с пленкой - Прозрачное */
        .bb {
            position: absolute; top: 38px; width: 100%; height: 60px;
            background: rgba(0,0,0,0.4); display: flex; justify-content: center; align-items: center;
            border-top: 1px solid rgba(255,255,255,0.02); border-bottom: 1px solid rgba(255,255,255,0.02);
        }
        .win {
            width: 220px; height: 42px; background: rgba(0,0,0,0.9);
            border-radius: 4px; border: 1px solid #222;
            display: flex; justify-content: space-between; align-items: center; padding: 0 15px;
            position: relative; overflow: hidden; box-shadow: inset 0 0 15px #000;
        }
        /* Сама пленка внутри кассеты */
        .t-rl {
            position: absolute; top: 50%; border-radius: 50%;
            background: radial-gradient(circle, #222 0, #050505 80%);
            box-shadow: 0 0 0 1px #111, 0 0 10px #000; transition: all 0.3s linear; z-index: 1;
        }
        .t-l { left: 32px; width: var(--tl); height: var(--tl); transform: translate(-50%, -50%); }
        .t-r { right: 32px; width: var(--tr); height: var(--tr); transform: translate(50%, -50%); }

        /* Катушки - Темно-серые */
        .sp {
            width: 30px; height: 30px; border-radius: 50%; background: #1a1a1a;
            position: relative; z-index: 5; border: 1px solid #333; box-shadow: 0 0 10px #000;
        }
        .spt {
            position: absolute; inset: 2px; border-radius: 50%;
            background: repeating-conic-gradient(#333 0deg, #333 30deg, #111 30deg, #111 60deg);
            animation: spn 2s linear infinite; animation-play-state: paused;
        }
        .sp::after {
            content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 8px; height: 8px; background: #000; border-radius: 50%; border: 1px solid #444;
        }
        .ply .spt { animation-play-state: running; }
        @keyframes spn { 100% { transform: rotate(360deg); } }

        /* 3. ЭКВАЛАЙЗЕР - ЛАЗЕРНЫЙ СКАНЕР ВНУТРИ ОКНА */
        .vc {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            display: flex; gap: 3px; align-items: center; height: 30px; z-index: 10;
            opacity: 0.1; transition: opacity 0.3s;
        }
        .ply .vc { opacity: 1; }
        .bar {
            width: 2px; background: var(--c); border-radius: 1px;
            animation: laser 0.6s infinite ease-in-out alternate;
            animation-play-state: paused; box-shadow: 0 0 8px var(--c);
        }
        .ply .bar { animation-play-state: running; }
        /* Разная задержка для каждой полоски */
        .bar:nth-child(1) { animation-duration: 0.4s; } .bar:nth-child(2) { animation-duration: 0.7s; }
        .bar:nth-child(3) { animation-duration: 0.3s; } .bar:nth-child(4) { animation-duration: 0.5s; background: var(--p); box-shadow: 0 0 8px var(--p);}
        .bar:nth-child(5) { animation-duration: 0.6s; background: var(--p); box-shadow: 0 0 8px var(--p);}
        .bar:nth-child(6) { animation-duration: 0.4s; } .bar:nth-child(7) { animation-duration: 0.8s; }
        @keyframes laser {
            0% { height: 4px; opacity: 0.4; }
            100% { height: 24px; opacity: 1; }
        }

        .gb {
            position: absolute; bottom: 10px; right: 15px;
            color: rgba(255,255,255,0.3); font-size: 10px; font-weight: 400; letter-spacing: 1px;
        }

        /* 4. ПРОГРЕСС-БАР ТРЕКА (Тонкая неоновая нить) */
        .pw {
            width: 100%; max-width: 380px; height: 4px; background: rgba(255,255,255,0.1);
            border-radius: 2px; position: relative; margin-top: 35px; cursor: pointer;
        }
        .pf {
            width: 0%; height: 100%; background: var(--c); border-radius: 2px;
            box-shadow: 0 0 10px var(--c); transition: width 0.1s linear; position: relative;
        }
        /* Светящаяся точка на конце прогресс-бара */
        .pf::after {
            content: ''; position: absolute; right: -4px; top: -3px; width: 10px; height: 10px;
            background: #fff; border-radius: 50%; box-shadow: 0 0 10px var(--c);
        }

        /* 5. КНОПКИ УПРАВЛЕНИЯ (Идеальные круги) */
        .mc { margin-top: 25px; display: flex; justify-content: center; align-items: center; gap: 15px; width: 100%; }
        .bn {
            background: rgba(20, 20, 25, 0.5); border: 1px solid rgba(255,255,255,0.05);
            color: #aaa; font-size: 16px; width: 45px; height: 45px; border-radius: 50%;
            cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }
        .bn:hover { background: rgba(40, 40, 50, 0.8); color: #fff; transform: scale(1.1); border-color: rgba(255,255,255,0.2); }
        .bn:active { transform: scale(0.95); }
        .bn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
        
        /* Главная кнопка (Капсула) */
        .pb {
            width: 110px; border-radius: 25px; font-weight: 800; letter-spacing: 2px;
            color: var(--c); border-color: rgba(0, 243, 255, 0.3); font-size: 14px;
        }
        .ply .pb {
            color: #fff; background: rgba(255, 0, 85, 0.15); border-color: var(--p);
            box-shadow: 0 0 20px rgba(255, 0, 85, 0.4); text-shadow: 0 0 5px #fff;
        }

        /* Громкость */
        .vol-wrap { display: flex; align-items: center; gap: 15px; width: 100%; max-width: 380px; margin-top: 25px; }
        .vol-wrap span { font-size: 12px; color: #666; font-weight: bold; }
        #vb { margin-top: 0; flex: 1; height: 3px; }
        #vf { background: #fff; box-shadow: 0 0 8px #fff; width: 100%; }
        #vf::after { display: none; } /* Убираем точку с громкости */

        /* 6. ПОИСК (Ультра-минимализм) */
        .sb { margin-top: 35px; width: 100%; max-width: 380px; display: flex; justify-content: center; }
        input {
            background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.2);
            color: #fff; font-weight: 500; padding: 12px 0; width: 100%; text-transform: uppercase;
            outline: none; text-align: center; font-size: 14px; letter-spacing: 3px; transition: all 0.3s ease;
        }
        input:focus { border-bottom-color: var(--c); box-shadow: 0 10px 10px -10px rgba(0, 243, 255, 0.3); }
        input::placeholder { color: #555; font-weight: 400; }

        /* Менюхи */
        .drc { position: fixed; inset: 0; z-index: 100; pointer-events: none; }
        .ov { position: absolute; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); opacity: 0; transition: opacity 0.3s; }
        .dr {
            position: absolute; bottom: 0; left: 0; right: 0; height: 75vh;
            background: rgba(10, 10, 12, 0.95); border-radius: 24px 24px 0 0;
            transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.2, 1, 0.3, 1);
            display: flex; flex-direction: column; padding: 30px 20px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .dh { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 15px; }
        .drt { margin: 0; color: #fff; font-size: 16px; font-weight: 800; letter-spacing: 3px; }
        .cb { background: transparent; border: none; color: #888; font-size: 28px; cursor: pointer; transition: color 0.2s; }
        .cb:hover { color: #fff; }
        .dco { overflow-y: auto; color: #fff; padding-bottom: 20px; }
        .drc.act { pointer-events: all; } .drc.act .ov { opacity: 1; } .drc.act .dr { transform: translateY(0); }
        
        .mi, .pi {
            padding: 18px 20px; background: transparent; border-radius: 8px;
            margin-bottom: 8px; cursor: pointer; transition: all 0.2s;
            border-left: 2px solid transparent; font-size: 13px; letter-spacing: 1px; color: #aaa;
        }
        .mi:hover, .pi:hover { background: rgba(255,255,255,0.03); color: #fff; transform: translateX(5px); }
        .pi.act { background: rgba(0,243,255,0.05); border-left-color: var(--c); color: var(--c); font-weight: 700; }

        .md {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 200;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            gap: 25px; padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.3s;
            backdrop-filter: blur(20px);
        }
        .md.act { opacity: 1; pointer-events: all; }
    </style>
</head>
<body>
    <div class="inf"><span class="tit" id="ti">АВРОРА СИСТЕМА</span><span class="art" id="ar">ОЖИДАНИЕ СИГНАЛА...</span></div>
    
    <div class="cas" id="dk">
        <div class="scr tl"></div><div class="scr tr"></div><div class="scr bl"></div><div class="scr br"></div>
        <div class="lbl">
            <div class="sl">AURORA</div>
            <div class="bb">
                <div class="win">
                    <div class="t-rl t-l"></div><div class="t-rl t-r"></div>
                    <!-- ЭКВАЛАЙЗЕР ТЕПЕРЬ ТУТ, МЕЖДУ КАТУШКАМИ -->
                    <div class="vc">
                        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                        <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
                    </div>
                    <div class="sp"><div class="spt"></div></div><div class="sp"><div class="spt"></div></div>
                </div>
            </div>
            <div class="gb">SYS_MK.60</div>
        </div>
    </div>
    
    <div class="pw" id="pb"><div class="pf" id="pf"></div></div>
    
    <div class="mc">
        <button class="bn" id="bp" onclick="a.p.prev()">◁</button> 
        <button class="bn pb" id="bpl" onclick="a.p.tog()">ПУСК</button> 
        <button class="bn" id="bn" onclick="a.p.nxt()">▷</button> 
        <button class="bn" onclick="a.u.tD('pl')">≡</button> 
        <button class="bn" onclick="a.u.tD('g')">♪</button> 
        <button class="bn" onclick="a.u.tA(true)">🤖</button>
    </div>
    
    <div class="vol-wrap">
        <span>MIN</span>
        <div class="pw" id="vb"><div class="pf" id="vf"></div></div>
        <span>MAX</span>
    </div>
    
    <form class="sb" onsubmit="a.s();return false"><input type="text" id="q" placeholder="ПОИСК ТРЕКА ИЛИ ИИ..."></form>
    
    <div id="drc" class="drc">
        <div class="ov" id="obg"></div>
        <div class="dr">
            <div class="dh"><h3 class="drt" id="drt">МЕНЮ</h3><button class="cb" onclick="a.u.tD()">✕</button></div>
            <div id="dco" class="dco"></div>
        </div>
    </div>
    
    <form id="am" class="md" onsubmit="a.aAI();return false">
        <h3 style="color:var(--p);margin-bottom:0;font-size:20px;letter-spacing:4px;text-shadow:0 0 15px var(--p)">ИИ ДИДЖЕЙ</h3>
        <input type="text" id="ai" placeholder="ОПИШИТЕ НАСТРОЕНИЕ..." style="max-width:320px">
        <div style="display:flex;gap:15px;width:100%;max-width:320px;margin-top:20px">
            <button type="submit" class="bn pb" style="flex:1; width:auto; border-radius:8px">ВРУБАЙ</button> 
            <button type="button" class="bn" onclick="a.u.tA(false)" style="flex:1; width:auto; border-radius:8px">ОТМЕНА</button>
        </div>
    </form>
    
    <script>
        // Логика осталась твоя, JS не тронут!
        if(window.Telegram && window.Telegram.WebApp){ window.Telegram.WebApp.expand(); window.Telegram.WebApp.ready(); }
        const $ = i => document.getElementById(i);
        
        const a = {
            st: {
                s: { p: [], ci: -1 }, l: {},
                sub(e, c) { this.l[e] = this.l[e] || []; this.l[e].push(c); },
                n(e, d) { if(this.l[e]) this.l[e].forEach(c => c(d)); },
                set(n) { Object.assign(this.s, n); if(n.p) this.n("p", this.s.p); if(n.ci !== undefined) this.n("t", this.s.p[this.s.ci]); }
            },
            
            ap: {
                b: window.location.origin,
                async f(e) { const r = await fetch(`${this.b}${e}`); if(!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); },
                s: (q) => a.ap.f(`/api/player/playlist?query=${encodeURIComponent(q)}`),
                aAI: (q) => a.ap.f(`/api/ai/dj?prompt=${encodeURIComponent(q)}`)
            },
            
            p: {
                au: new Audio(),
                init() {
                    this.au.addEventListener("ended", () => this.nxt());
                    this.au.addEventListener("timeupdate", () => a.u.uP(this.au.currentTime, this.au.duration));
                    this.au.addEventListener("play", () => a.u.sPS(true));
                    this.au.addEventListener("pause", () => a.u.sPS(false));
                    this.au.addEventListener("error", () => {
                        a.u.sE("ПЛЕНКА ЗАЖЕВАНА");
                        setTimeout(() => { if(a.st.s.p.length > 1) this.nxt(); }, 2000);
                    });
                    this.au.volume = 1;
                },
                ply(t) {
                    if(!t) return;
                    a.u.uT(t);
                    this.au.src = `${a.ap.b}/stream/${t.identifier}`;
                    this.au.play().catch(e => { console.warn("Autoplay blocked"); a.u.sPS(false); });
                },
                tog() { if(this.au.src) this.au.paused ? this.au.play() : this.au.pause(); },
                nxt() {
                    if(!a.st.s.p.length) return; let i = a.st.s.ci + 1;
                    if(i >= a.st.s.p.length) i = 0; a.st.set({ ci: i }); this.ply(a.st.s.p[i]);
                },
                prev() {
                    if(!a.st.s.p.length) return;
                    if(this.au.currentTime > 3) { this.au.currentTime = 0; } 
                    else { let i = a.st.s.ci - 1; if(i < 0) i = a.st.s.p.length - 1; a.st.set({ ci: i }); this.ply(a.st.s.p[i]); }
                }
            },
            
            u: {
                dr: null,
                sPS(p) { $("dk").classList.toggle("ply", p); $("bpl").innerText = p ? "СТОП" : "ПУСК"; },
                uT(t) { if(t) { $("ti").innerText = t.title || "НЕИЗВЕСТНО"; $("ar").innerText = t.artist || t.uploader || "НЕИЗВЕСТНО"; } },
                sE(m) { $("ti").innerText = m; $("ar").innerText = ""; this.sPS(false); },
                sL(l) { $("bpl").disabled = l; $("bn").disabled = l; $("bp").disabled = l; if(l) { $("ti").innerText = "НАСТРОЙКА..."; $("ar").innerText = "ОЖИДАЙТЕ..."; } },
                uP(c, t) {
                    if(t > 0) {
                        const p = c / t; $("pf").style.width = `${p * 100}%`;
                        const mt = 75, mnt = 28; const ls = mt - (p * (mt - mnt)), rs = mnt + (p * (mt - mnt));
                        document.documentElement.style.setProperty('--tl', `${ls}px`); document.documentElement.style.setProperty('--tr', `${rs}px`);
                    }
                },
                tD(d) {
                    const c = $("drc"); if(this.dr && this.dr === d) { this.dr = null; } else { this.dr = d; }
                    if(this.dr) { c.classList.add("act"); $("drt").textContent = this.dr === "pl" ? "ОЧЕРЕДЬ" : "КАТАЛОГ ЖАНРОВ"; this.rD(); } else { c.classList.remove("act"); }
                },
                rD() {
                    const c = $("dco"); c.innerHTML = "";
                    if(this.dr === "pl") {
                        if(!a.st.s.p.length) c.innerHTML = "<div style='text-align:center;color:#666;margin-top:20px'>КАССЕТА ПУСТА</div>";
                        a.st.s.p.forEach((t, i) => {
                            const d = document.createElement("div"); d.className = "pi" + (i === a.st.s.ci ? " act" : "");
                            d.textContent = `${t.title} - ${t.artist || t.uploader}`;
                            d.onclick = () => { a.st.set({ ci: i }); a.p.ply(t); this.tD(); }; c.appendChild(d);
                        });
                    } else if(this.dr === "g") {
                        a.g.forEach(g => {
                            const d = document.createElement("div"); d.className = "mi"; d.textContent = g.n;
                            d.onclick = () => { a.s(g.q); this.tD(); }; c.appendChild(d);
                        });
                    }
                },
                tA(s) { $("am").classList.toggle("act", s); }
            },
            
            g: [
                { n: "🔥 SC Тренды (Phonk)", q: "#Phonk #Remix" }, { n: "🎧 Tech House & EDM", q: "#TechHouse #Bootleg" },
                { n: "🎤 Dark Trap & Rap", q: "#Hip-hop #DarkTrap" }, { n: "🇷🇺 Русские Хиты", q: "русский поп #Remix" },
                { n: "☭ Советский Грув", q: "советский грув ретро" }, { n: "🎸 Альт. Рок & Shoegaze", q: "#AlternativeRock #Shoegaze" },
                { n: "✨ Lo-Fi & Chillhop", q: "#Lo-fi #Chillhop" }, { n: "🎲 Рандомный Бутлег", q: "#Mashup #Remix" }
            ],
            
            async s(qs) {
                const q = (typeof qs === 'string') ? qs : $("q").value; if(!q) return; this.u.sL(true);
                try {
                    const r = await this.ap.s(q);
                    if(r.playlist && r.playlist.length > 0) { this.st.set({ p: r.playlist, ci: 0 }); this.p.ply(r.playlist[0]); } else { this.u.sE("ТРЕК НЕ НАЙДЕН"); }
                } catch(e) { this.u.sE("НЕТ СИГНАЛА"); } finally { this.u.sL(false); }
            },
            
            async aAI() {
                const q = $("ai").value; if(!q) return;
                if('speechSynthesis' in window) { window.speechSynthesis.resume(); window.speechSynthesis.speak(new SpeechSynthesisUtterance('')); }
                this.u.tA(false); this.u.sL(true);
                try {
                    const r = await this.ap.aAI(q);
                    if(r.message && 'speechSynthesis' in window) {
                        window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(r.message);
